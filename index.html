<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 LEGUIDAMÓN PRODE 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Titillium+Web:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-red: #e10600;
            --f1-black: #15151e;
            --f1-dark-grey: #1f1f27;
            --gold: #ffcf00;
            --accent: #38383f;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Titillium Web', sans-serif;
            background: radial-gradient(circle at top, #2b2b36 0%, #0b0b10 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        header {
            background: rgba(21, 21, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--f1-red);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem; text-shadow: 2px 2px var(--f1-red); }

        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        .hidden { display: none !important; }

        /* Botonera de Números */
        .number-paddock {
            position: sticky;
            top: 80px;
            background: var(--f1-dark-grey);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--f1-red);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            margin-bottom: 20px;
            z-index: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .num-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-weight: bold;
        }

        .num-btn.used { opacity: 0.1; cursor: not-allowed; filter: grayscale(1); }
        .num-btn.active-sel { border: 2px solid var(--gold); background: #444; }

        /* Grid de Pilotos */
        .prediction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .driver-card {
            background: var(--f1-dark-grey);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pos-circle {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: var(--f1-black);
            border: 2px dashed var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron';
            font-weight: 900;
            color: var(--gold);
            cursor: pointer;
        }

        .assigned .pos-circle { background: var(--f1-red); color: white; border-style: solid; }

        /* Calendario */
        .gp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .gp-card { background: var(--f1-dark-grey); border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .gp-img { width: 100%; height: 140px; object-fit: cover; opacity: 0.5; }
        .gp-info { padding: 12px; border-top: 3px solid var(--f1-red); }

        .btn-main {
            background: var(--f1-red); color: white; border: none; padding: 12px 25px;
            font-family: 'Orbitron'; border-radius: 50px; cursor: pointer; font-weight: 900;
            text-transform: uppercase; font-size: 0.8rem;
        }

        .leaderboard { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .leaderboard tr { background: var(--f1-dark-grey); }
        .leaderboard td { padding: 20px; font-size: 1.3rem; }
    </style>
</head>
<body>

<header id="navbar" class="hidden">
    <div class="logo">F1 2026 PRODE</div>
    <div id="userDisplay" style="color: var(--gold); font-family: 'Orbitron';"></div>
    <nav>
        <button class="btn-main" onclick="app.showDashboard()">CALENDARIO</button>
        <button class="btn-main" onclick="changeView('view-leaderboard')">POSICIONES</button>
        <button class="btn-main" style="background: #444;" onclick="changeView('view-admin')">ADMIN</button>
    </nav>
</header>

<div class="container">
    <div id="view-login" style="text-align: center; margin-top: 80px;">
        <h1 style="font-family: 'Orbitron'; font-size: 2.5rem;">LEGUIDAMÓN F1 PRODE</h1>
        <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px;">
            <button class="btn-main" onclick="app.login('Sole')">SOLE</button>
            <button class="btn-main" onclick="app.login('Marce')">MARCE</button>
            <button class="btn-main" onclick="app.login('Valen')">VALEN</button>
            <button class="btn-main" onclick="app.login('Agus')">AGUS</button>
        </div>
    </div>

    <div id="view-dashboard" class="hidden">
        <h2 style="font-family: Orbitron; border-left: 5px solid var(--f1-red); padding-left: 15px;">TEMPORADA 2026</h2>
        <div id="gpGrid" class="gp-grid"></div>
    </div>

    <div id="view-prediction" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h2 id="predTitle" style="font-family: Orbitron;"></h2>
            <div id="modeToggle">
                <button id="btnRace" class="btn-main" onclick="app.toggleSubView('race')">CARRERA</button>
                <button id="btnSprint" class="btn-main" onclick="app.toggleSubView('sprint')" style="background:#555">SPRINT</button>
            </div>
        </div>
        <div id="numberSelector" class="number-paddock"></div>
        <div id="driverList" class="prediction-grid"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn-main" onclick="app.savePredictions()" style="padding: 20px 50px; font-size: 1.2rem;">GUARDAR PRONÓSTICO</button>
        </div>
    </div>

    <div id="view-admin" class="hidden">
        <h2 style="font-family: Orbitron;">CONTROL DE CARRERA (ADMIN)</h2>
        <div style="background: var(--f1-dark-grey); padding: 20px; border-radius: 15px; margin-bottom: 30px;">
            <label>Seleccionar GP para cargar RESULTADO REAL:</label>
            <select id="adminSelect" style="padding:10px; background:#222; color:white; width:100%; margin-top:10px;" onchange="app.loadAdminView()"></select>
        </div>
        
        <div id="adminNumberSelector" class="number-paddock"></div>
        <div id="adminDriverList" class="prediction-grid"></div>
        
        <div style="text-align: center; margin-top: 30px; display: flex; flex-direction: column; gap: 20px;">
            <button class="btn-main" style="background:green" onclick="app.calculateScores()">CALCULAR PUNTOS FAMILIARES</button>
            <hr style="width: 100%; opacity: 0.1;">
            <button class="btn-main" style="background: #333; font-size: 0.6rem; opacity: 0.7;" onclick="app.resetStats()">REINICIAR TODO EL PRODE (ESTADÍSTICAS A 0)</button>
        </div>
    </div>

    <div id="view-leaderboard" class="hidden">
        <h2 style="font-family: Orbitron; text-align: center;">TABLA DEL CAMPEONATO LEGUIZ</h2>
        <table class="leaderboard">
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</div>

<script>
    const DRIVERS = [
        "Lando Norris #1", "Oscar Piastri #81", "Max Verstappen #3", "Isack Hadjar #6",
        "Charles Leclerc #16", "Lewis Hamilton #44", "George Russell #63", "Kimi Antonelli #12",
        "Fernando Alonso #14", "Lance Stroll #18", "Pierre Gasly #10", "Franco Colapinto #43",
        "Alex Albon #23", "Carlos Sainz #55", "Liam Lawson #30", "Arvid Lindblad #41",
        "Esteban Ocon #31", "Oliver Bearman #87", "Nico Hülkenberg #27", "Gabriel Bortoleto #5",
        "Sergio Pérez #11", "Valtteri Bottas #77"
    ];

    const CALENDAR = [
        { id: 1, name: "Australia", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2024/12/Australia-Circuit-2025.webp" },
        { id: 2, name: "China", sprint: true, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2025/01/Circuit-Map-China-F1-_1_-Tile.webp" },
        { id: 3, name: "Japón", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Japan-F1.webp" },
        { id: 4, name: "Baréin", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Bahrain-F1.webp" },
        { id: 5, name: "Arabia Saudita", sprint: false, img: "https://www.racefans.net/wp-content/uploads/2021/07/racefansdotnet-jeddah-corniche-circuit.jpg" },
        { id: 6, name: "Miami", sprint: true, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2021/05/Miami_Version-2-rectangle_map.webp" },
        { id: 7, name: "Emilia-Romaña", sprint: false, img: "https://gpticketstore.vshcdn.net/uploads/images/13455/2025-f1-emilia-romagna-gp-imola-v2.jpg" },
        { id: 8, name: "Mónaco", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Monaco-F1.webp" },
        { id: 9, name: "España", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Spain-F1.webp" },
        { id: 10, name: "Canadá", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Canada-F1.webp" },
        { id: 11, name: "Austria", sprint: true, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Austria-F1.webp" },
        { id: 12, name: "Gran Bretaña", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2025/01/Circuit-Map-Silverstone-F1-_1_-Tile.webp" },
        { id: 13, name: "Bélgica", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Belgium-F1.webp" },
        { id: 14, name: "Hungría", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2023/08/Circuit-Map-Hungary-F1-_v2_-compressed-scaled-1.webp" },
        { id: 15, name: "Países Bajos", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Dutch-F1.webp" },
        { id: 16, name: "Italia", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2025/01/monza-circuit-2025_transparent.webp" },
        { id: 17, name: "Azerbaiyán", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Baku-F1.webp" },
        { id: 18, name: "Singapur", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Singapore-F1.webp" },
        { id: 19, name: "Austin (EE.UU)", sprint: true, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-US-F1.webp" },
        { id: 20, name: "México", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Mexico-F1.webp" },
        { id: 21, name: "Brasil", sprint: true, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2022/07/Circuit-Map-Brazil-F1.webp" },
        { id: 22, name: "Las Vegas", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2024/12/Las-Vegas-2025.png" },
        { id: 23, name: "Qatar", sprint: true, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2026/02/Lusail-Grandstands.jpg" },
        { id: 24, name: "Abu Dhabi", sprint: false, img: "https://www.grandprixgrandtours.com/wp-content/uploads/2024/11/Circuit-Map-Abu-Dhabi-F1.webp" }
    ];

    const app = {
        user: null, currentGp: null, activeSubView: 'race', selectedNumber: null, isAdmin: false,
        tempPreds: { race: {}, sprint: {} },
        data: JSON.parse(localStorage.getItem('f1_prode_v6')) || { preds: {}, results: {}, scores: { Sole: 0, Marce: 0, Valen: 0, Agus: 0 } },

        login(u) {
            this.user = u;
            document.getElementById('userDisplay').innerText = `PILOTO: ${u}`;
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            this.showDashboard();
        },

        showDashboard() {
            changeView('view-dashboard');
            const grid = document.getElementById('gpGrid');
            grid.innerHTML = "";
            CALENDAR.forEach(gp => {
                const hasPred = this.data.preds[this.user]?.[gp.id] ? '✅' : '❌';
                const card = document.createElement('div');
                card.className = 'gp-card';
                card.onclick = () => this.openGp(gp);
                card.innerHTML = `<img class="gp-img" src="${gp.img}"><div class="gp-info"><h3>${gp.name}</h3><p>${hasPred} Tu predicción</p></div>`;
                grid.appendChild(card);
            });
        },

        openGp(gp) {
            this.isAdmin = false; this.currentGp = gp;
            const saved = this.data.preds[this.user]?.[gp.id] || { race: [], sprint: [] };
            this.loadTemp(saved);
            changeView('view-prediction');
            this.refreshUI();
        },

        loadAdminView() {
            this.isAdmin = true;
            const gpId = document.getElementById('adminSelect').value;
            this.currentGp = CALENDAR.find(g => g.id == gpId);
            if(!this.currentGp) return;
            const saved = this.data.results[gpId] || { race: [], sprint: [] };
            this.loadTemp(saved);
            this.refreshUI();
        },

        loadTemp(source) {
            this.tempPreds = { race: {}, sprint: {} };
            if(source.race) source.race.forEach((p, i) => { if(p) this.tempPreds.race[DRIVERS.indexOf(p)] = i+1; });
            if(source.sprint) source.sprint.forEach((p, i) => { if(p) this.tempPreds.sprint[DRIVERS.indexOf(p)] = i+1; });
        },

        refreshUI() {
            const containerNum = this.isAdmin ? 'adminNumberSelector' : 'numberSelector';
            const containerDrivers = this.isAdmin ? 'adminDriverList' : 'driverList';
            document.getElementById('predTitle').innerText = `${this.currentGp.name} - ${this.activeSubView.toUpperCase()}`;
            document.getElementById('btnSprint').className = this.currentGp.sprint ? 'btn-main' : 'hidden';

            const numBox = document.getElementById(containerNum);
            numBox.innerHTML = "";
            const max = (this.activeSubView === 'sprint') ? 8 : 22;
            for(let i=1; i<=max; i++) {
                const btn = document.createElement('button');
                btn.className = `num-btn ${Object.values(this.tempPreds[this.activeSubView]).includes(i) ? 'used' : ''} ${this.selectedNumber === i ? 'active-sel' : ''}`;
                btn.innerText = i;
                btn.onclick = () => { if(!btn.classList.contains('used')) { this.selectedNumber = i; this.refreshUI(); } };
                numBox.appendChild(btn);
            }

            const driBox = document.getElementById(containerDrivers);
            driBox.innerHTML = "";
            DRIVERS.forEach((d, idx) => {
                const pos = this.tempPreds[this.activeSubView][idx];
                const card = document.createElement('div');
                card.className = `driver-card ${pos ? 'assigned' : ''}`;
                card.innerHTML = `<span>${d}</span><div class="pos-circle" onclick="app.clickDriver(${idx})">${pos || ''}</div>`;
                driBox.appendChild(card);
            });
        },

        clickDriver(idx) {
            if(this.tempPreds[this.activeSubView][idx]) delete this.tempPreds[this.activeSubView][idx];
            else if(this.selectedNumber) { this.tempPreds[this.activeSubView][idx] = this.selectedNumber; this.selectedNumber = null; }
            this.refreshUI();
        },

        toggleSubView(v) { this.activeSubView = v; this.refreshUI(); },

        savePredictions() {
            const res = this.convertTempToArr();
            if(!this.data.preds[this.user]) this.data.preds[this.user] = {};
            this.data.preds[this.user][this.currentGp.id] = res;
            this.save(); alert("¡Pronóstico guardado!"); this.showDashboard();
        },

        convertTempToArr() {
            const r = new Array(22).fill(""); const s = new Array(8).fill("");
            Object.entries(this.tempPreds.race).forEach(([idx, p]) => r[p-1] = DRIVERS[idx]);
            Object.entries(this.tempPreds.sprint).forEach(([idx, p]) => s[p-1] = DRIVERS[idx]);
            return { race: r, sprint: s };
        },

        calculateScores() {
            const gpId = this.currentGp.id;
            this.data.results[gpId] = this.convertTempToArr();
            
            // Reiniciar puntajes y calcular desde cero basándose en todos los resultados cargados
            this.data.scores = { Sole: 0, Marce: 0, Valen: 0, Agus: 0 };
            
            Object.keys(this.data.results).forEach(id => {
                const real = this.data.results[id]; // El orden oficial cargado por admin
                ['Sole', 'Marce', 'Valen', 'Agus'].forEach(u => {
                    const userPred = this.data.preds[u]?.[id];
                    if(!userPred) return;

                    const logic = (p, r) => {
                        // r es el array oficial [1ro, 2do, 3ro...]
                        // p es el array del usuario [1ro, 2do, 3ro...]
                        r.forEach((pilotoReal, posRealIdx) => {
                            if(!pilotoReal) return;
                            const posUserIdx = p.indexOf(pilotoReal);
                            
                            if(posUserIdx !== -1) {
                                const diff = Math.abs(posRealIdx - posUserIdx);
                                if(diff === 0) {
                                    this.data.scores[u] += 25; // Exacto
                                } else if(diff === 1) {
                                    this.data.scores[u] += 5; // +- 1 posición
                                }
                            }
                        });
                    };

                    logic(userPred.race, real.race);
                    if(real.sprint && real.sprint.some(x => x !== "")) {
                        logic(userPred.sprint, real.sprint);
                    }
                });
            });
            
            this.save(); 
            alert("¡Tabla de posiciones actualizada!"); 
            changeView('view-leaderboard');
        },

        resetStats() {
            if(confirm("¿BORRAR TODO? Esto eliminará predicciones, resultados y puntos de todos.")) {
                this.data = { preds: {}, results: {}, scores: { Sole: 0, Marce: 0, Valen: 0, Agus: 0 } };
                this.save(); 
                location.reload();
            }
        },

        save() { localStorage.setItem('f1_prode_v6', JSON.stringify(this.data)); }
    };

    function changeView(id) {
        ['view-login', 'view-dashboard', 'view-prediction', 'view-admin', 'view-leaderboard'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-leaderboard') renderLeaderboard();
        if(id === 'view-admin') {
            const s = document.getElementById('adminSelect');
            s.innerHTML = '<option value="">--- Selecciona un GP ---</option>';
            CALENDAR.forEach(g => s.innerHTML += `<option value="${g.id}">${g.name}</option>`);
        }
    }

    function renderLeaderboard() {
        const b = document.getElementById('leaderboardBody');
        b.innerHTML = "";
        Object.entries(app.data.scores).sort((a,b) => b[1]-a[1]).forEach((e, i) => {
            const isFirst = i === 0 && e[1] > 0;
            const color = isFirst ? 'var(--gold)' : 'white';
            const icon = isFirst ? '👑 ' : '';
            b.innerHTML += `<tr>
                <td style="color:${color}; font-weight:900">#${i+1}</td>
                <td style="font-family:Orbitron; color:${color}">${icon}${e[0]}</td>
                <td style="color:var(--f1-red); font-weight:900; text-align:right">${e[1]} PTS</td>
            </tr>`;
        });
    }
</script>
</body>
</html>
